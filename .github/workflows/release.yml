name: Release

on:
  push:
    tags:
      - 'v*'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release:
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install frontend dependencies
        run: pnpm install

      - name: Build Tauri app
        run: pnpm tauri build

      - name: Ad-hoc sign macOS app
        run: |
          codesign --force --deep --sign - \
            src-tauri/target/release/bundle/macos/CC-Day.app

      - name: Create signed DMG
        run: |
          ARCH=$(uname -m)
          VERSION=${GITHUB_REF_NAME#v}
          mkdir -p /tmp/dmg-content
          cp -R src-tauri/target/release/bundle/macos/CC-Day.app /tmp/dmg-content/
          ln -sf /Applications /tmp/dmg-content/Applications
          hdiutil create -volname "CC-Day" \
            -srcfolder /tmp/dmg-content \
            -ov -format UDZO \
            "CC-Day_${VERSION}_${ARCH}.dmg"

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          name: 'CC-Day ${{ github.ref_name }}'
          body: 'See the assets to download this version.'
          draft: false
          prerelease: false
          files: CC-Day_*.dmg
